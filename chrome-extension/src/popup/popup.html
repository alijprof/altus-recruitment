<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Altus — LinkedIn capture</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px 0;
        font-weight: 600;
      }
      button#capture {
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        background: #0a66c2;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button#capture:disabled {
        background: #6b7280;
        cursor: progress;
      }
      .status {
        margin-top: 12px;
        font-size: 12px;
        min-height: 16px;
        color: #6b7280;
      }
      .status[data-tone='ok'] {
        color: #15803d;
      }
      .status[data-tone='error'] {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>Altus — LinkedIn capture</h1>
    <button id="capture" type="button">Capture this profile</button>
    <div id="status" class="status" role="status" aria-live="polite"></div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
